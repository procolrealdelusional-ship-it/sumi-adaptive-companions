<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SUMI Dojo</title><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0a0f;--card:#12121a;--accent:#6c5ce7;--yin:#4ecdc4;--yang:#ff6b6b;--text:#e0e0e0;--dim:#666;--gold:#ffd700;--green:#00b894}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app{max-width:480px;margin:0 auto;padding:16px}.header{text-align:center;padding:24px 0}.header h1{font-size:1.8rem;background:linear-gradient(135deg,var(--yin),var(--yang));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.header .sub{color:var(--dim);font-size:.7rem;margin-top:4px;letter-spacing:3px}.sbar{display:flex;justify-content:space-between;background:var(--card);border-radius:12px;padding:12px 16px;margin:12px 0;border:1px solid #1a1a2e}.sbar .sk{font-size:1.1rem;color:var(--gold)}.sbar .xp{color:var(--green);font-size:.85rem}.yy{width:60px;height:60px;margin:16px auto;border-radius:50%;background:conic-gradient(var(--yin) 0deg 180deg,var(--yang) 180deg 360deg);animation:sp 8s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.bal{text-align:center;margin:8px 0 16px}.bal-bar{width:200px;height:6px;background:#1a1a2e;border-radius:3px;margin:6px auto;overflow:hidden;display:flex}.bal-bar .yf{background:var(--yin);transition:width .5s}.bal-bar .af{background:var(--yang);transition:width .5s}.bal span{font-size:.65rem;color:var(--dim)}.stit{font-size:.75rem;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin:20px 0 10px}.wg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wc{background:var(--card);border-radius:14px;padding:16px;cursor:pointer;border:1px solid #1a1a2e;transition:all .3s;position:relative;overflow:hidden}.wc:hover{border-color:var(--accent);transform:translateY(-2px)}.wc .em{font-size:2rem;margin-bottom:8px}.wc .nm{font-size:.8rem;font-weight:600}.wc .ds{font-size:.6rem;color:var(--dim);margin-top:4px}.wc .lv{position:absolute;top:8px;right:8px;font-size:.55rem;background:var(--accent);padding:2px 6px;border-radius:8px;color:#fff}.cp{background:var(--card);border-radius:14px;padding:20px;margin:12px 0;border:1px solid #1a1a2e;text-align:center}.cp .av{font-size:3rem;margin:8px 0}.cp .cn{font-size:.9rem;font-weight:600;color:var(--accent)}.cp .dl{font-size:.7rem;color:var(--dim);margin:8px 0;line-height:1.6;font-style:italic}.ls{display:flex;gap:6px;justify-content:center;margin:10px 0}.lb{background:#1a1a2e;border:1px solid #2a2a3e;color:var(--dim);padding:4px 10px;border-radius:8px;font-size:.6rem;cursor:pointer;font-family:inherit}.lb.ac{background:var(--accent);color:#fff;border-color:var(--accent)}.da{background:var(--card);border-radius:14px;padding:20px;margin:12px 0;border:1px solid #1a1a2e}.da h3{font-size:.8rem;color:var(--accent);margin-bottom:12px}.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.dt{aspect-ratio:1;background:#1a1a2e;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;transition:all .2s;border:2px solid transparent}.dt:hover{border-color:var(--accent);transform:scale(1.05)}.dt.ok{background:var(--green);border-color:var(--green)}.dt.no{background:var(--yang);border-color:var(--yang)}.dt.rv{background:var(--accent);border-color:var(--accent)}.dp{text-align:center;font-size:.75rem;margin:12px 0}.ds2{text-align:center;font-size:.65rem;color:var(--dim);margin-top:8px}.btn{background:linear-gradient(135deg,var(--yin),var(--accent));border:none;color:#fff;padding:10px 24px;border-radius:10px;font-family:inherit;font-size:.75rem;cursor:pointer;letter-spacing:1px}.btn:hover{opacity:.9}.nb{display:flex;justify-content:center;gap:8px;margin:16px 0}.nbn{background:var(--card);border:1px solid #1a1a2e;color:var(--dim);padding:8px 16px;border-radius:10px;font-family:inherit;font-size:.65rem;cursor:pointer}.nbn.ac{color:var(--accent);border-color:var(--accent)}.ft{text-align:center;padding:20px 0;color:var(--dim);font-size:.55rem;letter-spacing:2px}.lbr{background:var(--card);border-radius:14px;padding:16px;margin:12px 0;border:1px solid #1a1a2e}.lr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a2e;font-size:.7rem}.lr:last-child{border:none}.pd{background:var(--card);border-radius:14px;padding:16px;margin:12px 0;border:1px solid #1a1a2e}.sr{display:flex;justify-content:space-between;padding:6px 0;font-size:.7rem}.dc{display:flex;justify-content:space-between;margin-bottom:12px;font-size:.7rem}</style></head><body><div class="app" id="app"></div><script>var W=[{id:'zen',n:'Zen Garden',e:'🌸',d:'Calm focus',g:'yin',l:1,u:1},{id:'fire',n:'Fire Dojo',e:'🔥',d:'Speed drills',g:'yang',l:1,u:1},{id:'ocean',n:'Ocean Temple',e:'🌊',d:'Memory patterns',g:'yin',l:2,u:1},{id:'thunder',n:'Thunder Peak',e:'⚡',d:'Rapid sequence',g:'yang',l:2,u:1},{id:'bamboo',n:'Bamboo Forest',e:'🎋',d:'Rhythm drills',g:'yin',l:3,u:0},{id:'volcano',n:'Volcano Core',e:'🌋',d:'Endurance',g:'yang',l:3,u:0}];var C=[{id:'dee',n:'Dee Dee',e:'🐼',dl:{en:'Focus your mind... breathe with me.',pj:'Mann lagaa... mere naal saah le.',pg:'Chal focus kar... breathe with me na.'},g:'yin'},{id:'koko',n:'Koko',e:'🐵',dl:{en:"Let's GO! Smash those tiles!",pj:'Chal oye! Tiles todh de!',pg:'Come on yaar! Tiles smash kar!'},g:'yang'},{id:'mochi',n:'Mochi',e:'🐱',dl:{en:'Patience reveals the pattern.',pj:'Sabar naal pattern dikhda.',pg:'Patience rakh... pattern mil jauga.'},g:'yin'},{id:'blaze',n:'Blaze',e:'🦊',dl:{en:'Faster! You can do better!',pj:'Tez! Tu hor vadiya kar sakda!',pg:'Faster chal! Tu better kar sakda!'},g:'yang'}];var SY={zen:['🌸','🍃','💮','🌺','🎋','🌿','🌷','🌹','🌻'],fire:['🔥','💥','⚡','🌟','💫','✨','🎯','🎪','🎭'],ocean:['🌊','🐚','🐠','🦈','🐙','🦑','🐬','🐳','🦀'],thunder:['⚡','🌩','💨','🌪','🔮','💎','⚔','🛡','🏹']};var PR={zen:{en:'Find the matching pair',pj:'Jodi labh',pg:'Matching pair labh na'},fire:{en:'Tap the target!',pj:'Nishana maro!',pg:'Target tap kar!'},ocean:{en:'Remember the sequence',pj:'Sequence yaad rakh',pg:'Sequence yaad kar na'},thunder:{en:'React to lightning!',pj:'Bijli te react kar!',pg:'Lightning te react kar!'}};var S={scr:'home',lang:'en',streak:+(localStorage.sumi_sk||0),xp:+(localStorage.sumi_xp||0),yin:50,yang:50,ci:0,wi:null,dr:{c:0,t:3,sc:0,tiles:[],rv:[],mt:[],tgt:null,ph:'idle',tm:0},lb:[{n:'Viraj',s:2400},{n:'Aman',s:1850},{n:'Preet',s:1600},{n:'Harjot',s:1200},{n:'Simran',s:950}]};function sv(){localStorage.sumi_sk=S.streak;localStorage.sumi_xp=S.xp}function R(){document.getElementById('app').innerHTML=S.scr=='home'?hm():S.scr=='drill'?dl():S.scr=='board'?bd():S.scr=='parent'?pt():S.scr=='done'?dn():''}function hm(){var c=C[S.ci],d=c.dl[S.lang];return '<div class="header"><h1>SUMI DOJO</h1><div class="sub">ADAPTIVE COMPANIONS</div></div><div class="sbar"><div class="sk">🔥 '+S.streak+' streak</div><div class="xp">⚡ '+S.xp+' XP</div></div><div class="yy"></div><div class="bal"><div class="bal-bar"><div class="yf" style="width:'+S.yin+'%"></div><div class="af" style="width:'+S.yang+'%"></div></div><span>☯ Yin '+S.yin+'% / Yang '+S.yang+'%</span></div><div class="ls"><button class="lb'+(S.lang=='en'?' ac':'')+'" onclick="sL(\'en\')">English</button><button class="lb'+(S.lang=='pj'?' ac':'')+'" onclick="sL(\'pj\')">ਪੰਜਾਬੀ</button><button class="lb'+(S.lang=='pg'?' ac':'')+'" onclick="sL(\'pg\')">Punglish</button></div><div class="cp"><div class="av">'+c.e+'</div><div class="cn">'+c.n+'</div><div class="dl">'+d+'</div><button class="btn" style="margin-top:8px;font-size:.6rem" onclick="nC()">Switch Companion</button></div><div class="stit">Choose Your World</div><div class="wg">'+W.map(function(w){return '<div class="wc" onclick="'+(w.u?"eW('"+w.id+"')":'')+' " style="'+(w.u?'':'opacity:.4;cursor:not-allowed')+'"><div class="lv">Lv.'+w.l+'</div><div class="em">'+w.e+'</div><div class="nm">'+w.n+'</div><div class="ds">'+w.d+'</div></div>'}).join('')+'</div><div class="nb"><button class="nbn ac" onclick="go(\'home\')">🏠 Dojo</button><button class="nbn" onclick="go(\'board\')">🏆 Board</button><button class="nbn" onclick="go(\'parent\')">👨‍👩‍👧 Parent</button></div><div class="ft">SUMI DOJO v1.0 — ADAPTIVE FOCUS TRAINING</div>'}function dl(){var w=W.find(function(x){return x.id==S.wi}),sy=SY[S.wi]||SY.zen,pr=PR[S.wi]||PR.zen,c=C[S.ci];var tl='';for(var i=0;i<9;i++){var cls='dt';if(S.dr.mt.indexOf(i)>=0)cls+=' ok';else if(S.dr.rv.indexOf(i)>=0)cls+=' rv';tl+='<div class="'+cls+'" onclick="tT('+i+')">'+((S.dr.rv.indexOf(i)>=0||S.dr.mt.indexOf(i)>=0)?S.dr.tiles[i]:'❓')+'</div>'}return '<div class="header"><h1>'+w.e+' '+w.n+'</h1></div><div class="cp"><div class="av">'+c.e+'</div><div class="cn">'+c.n+'</div><div class="dl">'+c.dl[S.lang]+'</div></div><div class="da"><div class="dc"><span style="color:var(--gold)">Drill '+(S.dr.c+1)+'/'+S.dr.t+'</span><span style="color:var(--green)">Score: '+S.dr.sc+'</span></div><h3>'+pr[S.lang]+'</h3><div class="dg">'+tl+'</div><div class="ds2">Tap tiles to reveal and match pairs</div></div><div class="nb"><button class="nbn" onclick="go(\'home\')">← Back to Dojo</button></div>'}function bd(){var r='';S.lb.forEach(function(x,i){r+='<div class="lr"><span style="color:var(--gold);width:24px">#'+(i+1)+'</span><span style="flex:1">'+x.n+'</span><span style="color:var(--green)">'+x.s+' XP</span></div>'});return '<div class="header"><h1>🏆 Leaderboard</h1></div><div class="lbr">'+r+'</div><div class="sbar"><div class="sk">Your Rank</div><div class="xp">#'+(S.lb.filter(function(x){return x.s>S.xp}).length+1)+'</div></div><div class="nb"><button class="nbn" onclick="go(\'home\')">🏠 Dojo</button><button class="nbn ac" onclick="go(\'board\')">🏆 Board</button><button class="nbn" onclick="go(\'parent\')">👨‍👩‍👧 Parent</button></div>'}function pt(){return '<div class="header"><h1>👨‍👩‍👧 Parent Dashboard</h1></div><div class="pd"><div class="sr"><span style="color:var(--dim)">Total XP</span><span style="color:var(--yin)">'+S.xp+'</span></div><div class="sr"><span style="color:var(--dim)">Current Streak</span><span style="color:var(--gold)">'+S.streak+' days</span></div><div class="sr"><span style="color:var(--dim)">Yin Balance</span><span style="color:var(--yin)">'+S.yin+'%</span></div><div class="sr"><span style="color:var(--dim)">Yang Balance</span><span style="color:var(--yang)">'+S.yang+'%</span></div><div class="sr"><span style="color:var(--dim)">Companion</span><span style="color:var(--accent)">'+C[S.ci].n+'</span></div><div class="sr"><span style="color:var(--dim)">Language</span><span style="color:var(--accent)">'+{en:'English',pj:'ਪੰਜਾਬੀ',pg:'Punglish'}[S.lang]+'</span></div><div class="sr"><span style="color:var(--dim)">Sessions Today</span><span style="color:var(--green)">'+Math.floor(S.xp/100)+'</span></div></div><div class="nb"><button class="nbn" onclick="go(\'home\')">🏠 Dojo</button><button class="nbn" onclick="go(\'board\')">🏆 Board</button><button class="nbn ac" onclick="go(\'parent\')">👨‍👩‍👧 Parent</button></div>'}function dn(){var w=W.find(function(x){return x.id==S.wi});return '<div class="header"><h1>✨ Session Complete!</h1></div><div class="cp"><div class="av">'+C[S.ci].e+'</div><div class="cn">'+C[S.ci].n+' says:</div><div class="dl">'+(S.lang=='pj'?'Bahut vadiya! Tu champion hai!':S.lang=='pg'?'Amazing yaar! Tu champion hai!':'Amazing! You are a champion!')+'</div></div><div class="pd"><div class="sr"><span style="color:var(--dim)">World</span><span style="color:var(--accent)">'+w.e+' '+w.n+'</span></div><div class="sr"><span style="color:var(--dim)">Score</span><span style="color:var(--green)">'+S.dr.sc+'/'+S.dr.t+'</span></div><div class="sr"><span style="color:var(--dim)">XP Earned</span><span style="color:var(--gold)">+'+(S.dr.sc*50)+'</span></div><div class="sr"><span style="color:var(--dim)">Streak</span><span style="color:var(--gold)">'+S.streak+' days</span></div></div><button class="btn" onclick="go(\'home\')" style="display:block;margin:16px auto">🏠 Return to Dojo</button>'function go(s){S.scr=s;R()}function sL(l){S.lang=l;R()}function nC(){S.ci=(S.ci+1)%C.length;R()}function eW(id){S.wi=id;S.dr={c:0,t:3,sc:0,tiles:[],rv:[],mt:[],tgt:null,ph:'idle',tm:0};mkT();S.scr='drill';R()}function mkT(){var sy=SY[S.wi]||SY.zen;var p=[];for(var i=0;i<4;i++)p.push(sy[i%sy.length]);p=p.concat(p);p.push(sy[4]||sy[0]);for(var i=p.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=p[i];p[i]=p[j];p[j]=t}S.dr.tiles=p;S.dr.rv=[];S.dr.mt=[]}function tT(i){if(S.dr.mt.indexOf(i)>=0||S.dr.rv.indexOf(i)>=0||S.dr.rv.length>=2)return;S.dr.rv.push(i);R();if(S.dr.rv.length==2){var a=S.dr.rv[0],b=S.dr.rv[1];if(S.dr.tiles[a]==S.dr.tiles[b]){S.dr.mt.push(a);S.dr.mt.push(b);S.dr.rv=[];S.dr.sc++;if(S.dr.mt.length>=8){S.dr.c++;if(S.dr.c>=S.dr.t){fin()}else{setTimeout(function(){mkT();R()},800)}}R()}else{setTimeout(function(){S.dr.rv=[];R()},800)}}}function fin(){var w=W.find(function(x){return x.id==S.wi});var xp=S.dr.sc*50;S.xp+=xp;S.streak++;if(w.g=='yin'){S.yin=Math.min(100,S.yin+5);S.yang=Math.max(0,S.yang-5)}else{S.yang=Math.min(100,S.yang+5);S.yin=Math.max(0,S.yin-5)}sv();S.scr='done';R()}R();</script></body></html>}
